<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYSTARBLISS STUDIOS - Login Portal (DEBUG)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --snow: #FFFAFA;
            --madder: #A91B0D;
            --golden: #FFD700;
            --dark: #1a1a1a;
            --gray: #4a5568;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #A91B0D 0%, #8B1507 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 3rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            color: var(--madder);
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .user-type-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: #f7fafc;
            padding: 0.5rem;
            border-radius: 12px;
        }

        .user-type-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            color: var(--gray);
        }

        .user-type-btn.active {
            background: var(--madder);
            color: white;
            box-shadow: 0 4px 12px rgba(169, 27, 13, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--madder);
            box-shadow: 0 0 0 4px rgba(169, 27, 13, 0.1);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle button {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray);
            padding: 0.5rem;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--madder), #d62a1a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(169, 27, 13, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(169, 27, 13, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .debug-console {
            background: #1a1a1a;
            color: #0f0;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .debug-console.show {
            display: block;
        }

        .debug-line {
            margin-bottom: 0.3rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--madder);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--madder);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>WELCOME BACK!</h1>
            <p>Login Portal (Debug Mode)</p>
        </div>

        <div class="user-type-selector">
            <button class="user-type-btn" data-type="admin">Admin</button>
            <button class="user-type-btn active" data-type="school">Schools</button>
            <button class="user-type-btn" data-type="private">Private</button>
            <button class="user-type-btn" data-type="staff">Staff</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-toggle">
                    <input type="password" id="password" required placeholder="Enter your password">
                    <button type="button" onclick="togglePassword()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
<button type="button" class="login-btn" style="background: #10b981; margin-bottom: 1rem;" onclick="createTestAdmin()">
    🔧 Create Test Admin Account
</button>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: var(--gray);">Logging in...</p>
        </div>

        <div class="debug-console" id="debugConsole">
            <div style="color: #FFD700; margin-bottom: 0.5rem;">🔍 DEBUG LOG:</div>
        </div>

        <div class="back-link">
            <a href="../../index.html">← Back to Main Site</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC0K83bfTV3dI_1URsYe_X1-lW-qzEsYmQ",
            authDomain: "jaystarbliss-studios.firebaseapp.com",
            projectId: "jaystarbliss-studios",
            storageBucket: "jaystarbliss-studios.firebasestorage.app",
            messagingSenderId: "885364100276",
            appId: "1:885364100276:web:081a2963cce28a0d0e1be1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserType = 'school';
        const debugConsole = document.getElementById('debugConsole');

        // Debug logger
        function debugLog(message, type = 'info') {
            const colors = {
                info: '#0ff',
                success: '#0f0',
                error: '#f00',
                warning: '#ff0'
            };
            const line = document.createElement('div');
            line.className = 'debug-line';
            line.style.color = colors[type];
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugConsole.appendChild(line);
            debugConsole.scrollTop = debugConsole.scrollHeight;
            debugConsole.classList.add('show');
            console.log(message);
        }

        // User type selector
        document.querySelectorAll('.user-type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const selectedType = this.dataset.type;
                
                debugLog(`User selected type: ${selectedType}`, 'info');
                
                if (selectedType === 'private') {
                    debugLog('Redirecting to student-login.html...', 'warning');
                    window.location.href = 'student-login.html';
                    return;
                }
                
                document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentUserType = selectedType;
            });
        });

        // Form submit handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = document.getElementById('loginForm');
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Clear previous debug logs
            debugConsole.innerHTML = '<div style="color: #FFD700; margin-bottom: 0.5rem;">🔍 DEBUG LOG:</div>';

            debugLog(`Starting login attempt...`, 'info');
            debugLog(`Email: ${email}`, 'info');
            debugLog(`User Type: ${currentUserType}`, 'info');

            form.style.display = 'none';
            loading.style.display = 'block';
            errorMessage.classList.remove('show');

            try {
                debugLog('Step 1: Attempting Firebase Auth sign in...', 'info');
                
                // Sign in with Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                debugLog(`✅ Firebase Auth successful! UID: ${user.uid}`, 'success');
                debugLog(`Step 2: Fetching user document from Firestore...`, 'info');

                // Get user role from Firestore
                const userDocRef = doc(db, 'users', user.uid);
                debugLog(`Document path: users/${user.uid}`, 'info');
                
                const userDoc = await getDoc(userDocRef);
                
                if (!userDoc.exists()) {
                    debugLog('❌ ERROR: User document does not exist in Firestore!', 'error');
                    debugLog('This means the user was created in Firebase Auth but not in Firestore', 'warning');
                    throw new Error('User profile not found. Please contact administrator.');
                }

                debugLog('✅ User document found!', 'success');
                const userData = userDoc.data();
                
                debugLog(`User data: ${JSON.stringify(userData, null, 2)}`, 'info');
                debugLog(`User role in DB: "${userData.role}"`, 'info');
                debugLog(`Selected user type: "${currentUserType}"`, 'info');
                debugLog(`Role match: ${userData.role === currentUserType}`, userData.role === currentUserType ? 'success' : 'error');

                // Verify user type matches selected type
                if (userData && userData.role === currentUserType) {
                    debugLog('✅ Role verification passed!', 'success');
                    
                    // Store user info
                    sessionStorage.setItem('userRole', currentUserType);
                    sessionStorage.setItem('userEmail', email);
                    sessionStorage.setItem('userId', user.uid);
                    
                    debugLog('Session data stored successfully', 'success');

                    // Redirect based on role
                    let redirectUrl = '';
                    if (currentUserType === 'admin') {
                        redirectUrl = 'admin-dashboard.html';
                    } else if (currentUserType === 'school') {
                        redirectUrl = 'student-portal.html?type=school';
                    } else if (currentUserType === 'staff') {
                        redirectUrl = 'staff-portal.html';
                    }
                    
                    debugLog(`Redirecting to: ${redirectUrl}`, 'success');
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1000);
                    
                } else {
                    debugLog('❌ Role verification FAILED!', 'error');
                    debugLog(`Expected role: "${currentUserType}"`, 'error');
                    debugLog(`Actual role: "${userData?.role || 'undefined'}"`, 'error');
                    throw new Error(`Invalid credentials for selected user type. Please select "${userData?.role || 'the correct user type'}".`);
                }

            } catch (error) {
                form.style.display = 'block';
                loading.style.display = 'none';
                
                debugLog('❌ LOGIN FAILED!', 'error');
                debugLog(`Error code: ${error.code}`, 'error');
                debugLog(`Error message: ${error.message}`, 'error');
                
                let displayMessage = 'Invalid credentials. Please try again.';
                
                if (error.code === 'auth/user-not-found') {
                    displayMessage = 'No user found with this email.';
                    debugLog('User does not exist in Firebase Auth', 'error');
                } else if (error.code === 'auth/wrong-password') {
                    displayMessage = 'Incorrect password.';
                    debugLog('Password is incorrect', 'error');
                } else if (error.code === 'permission-denied') {
                    displayMessage = 'Permission denied. Check Firestore rules.';
                    debugLog('Firestore permission denied - check your security rules!', 'error');
                } else if (error.message.includes('role')) {
                    displayMessage = error.message;
                }
                
                errorMessage.textContent = displayMessage;
                errorMessage.classList.add('show');
            }
        });

        // Password toggle
        window.togglePassword = function() {
            const passwordInput = document.getElementById('password');
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        };

        window.createTestAdmin = async function() {
    if (!confirm('Create test admin account?\nEmail: admin@test.com\nPassword: Admin123456')) return;
    
    debugLog('Creating test admin account...', 'warning');
    
    try {
        // Import createUserWithEmailAndPassword
        const { createUserWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
        const { setDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        
        const testEmail = 'admin@test.com';
        const testPassword = 'Admin123456';
        
        // Create auth user
        const userCred = await createUserWithEmailAndPassword(auth, testEmail, testPassword);
        debugLog(`✅ Auth user created: ${userCred.user.uid}`, 'success');
        
        // Create Firestore document
        await setDoc(doc(db, 'users', userCred.user.uid), {
            email: testEmail,
            name: 'Test Admin',
            role: 'admin',
            createdAt: new Date()
        });
        
        debugLog(`✅ Firestore document created!`, 'success');
        alert('✅ Test admin created!\nEmail: admin@test.com\nPassword: Admin123456');
        
    } catch (error) {
        debugLog(`❌ Error: ${error.message}`, 'error');
        alert('Error: ' + error.message);
    }
};

        

        debugLog('Login page loaded and ready', 'success');
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
