<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration - JAYSTARBLISS STUDIOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --snow: #FFFAFA;
            --madder: #A91B0D;
            --golden: #FFD700;
            --dark: #1a1a1a;
            --gray: #4a5568;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #A91B0D 0%, #8B1507 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 3rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            color: var(--madder);
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .info-box {
            background: #fff9e6;
            border-left: 4px solid var(--golden);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--madder);
            box-shadow: 0 0 0 4px rgba(169, 27, 13, 0.1);
        }

        .register-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--madder), #d62a1a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(169, 27, 13, 0.3);
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(169, 27, 13, 0.4);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .success-message, .error-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
        }

        .error-message {
            background: #fee;
            color: #c33;
        }

        .success-message.show, .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--madder);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>👨‍🏫 Staff Registration</h1>
            <p>Create Your Staff Account</p>
        </div>

        <div class="info-box">
            <strong>⚠️ For Staff Members Only:</strong><br>
            Use the registration code provided by your administrator to create your account.
        </div>

        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="regCode">Registration Code</label>
                <input type="text" id="regCode" required placeholder="Enter code from admin">
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Create a strong password">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Re-enter password">
            </div>

            <button type="submit" class="register-btn" id="registerBtn">Create Account</button>
        </form>

        <div class="back-link">
            <a href="login.html">← Already have an account? Login</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC0K83bfTV3dI_1URsYe_X1-lW-qzEsYmQ",
            authDomain: "jaystarbliss-studios.firebaseapp.com",
            projectId: "jaystarbliss-studios",
            storageBucket: "jaystarbliss-studios.firebasestorage.app",
            messagingSenderId: "885364100276",
            appId: "1:885364100276:web:081a2963cce28a0d0e1be1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // The secret code (admin sets this)
        const STAFF_REG_CODE = "JAYSTAR2024"; // Change this in your admin panel

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const regCode = document.getElementById('regCode').value.trim();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            const btn = document.getElementById('registerBtn');

            // Hide messages
            successMsg.classList.remove('show');
            errorMsg.classList.remove('show');

            // Validate
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match!';
                errorMsg.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters!';
                errorMsg.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                // Verify registration code from Firestore
                const regCodeDoc = await getDoc(doc(db, 'staffRegistration', 'code'));
                const validCode = regCodeDoc.exists() ? regCodeDoc.data().code : STAFF_REG_CODE;

                if (regCode !== validCode) {
                    throw new Error('Invalid registration code!');
                }

                // Create Firebase Auth user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('✅ Firebase Auth user created:', user.uid);

                // Create Firestore user document with staff role
                await setDoc(doc(db, 'users', user.uid), {
                    email: email,
                    name: name,
                    role: 'staff',
                    createdAt: serverTimestamp()
                });

                console.log('✅ Firestore document created with staff role');

                successMsg.textContent = '✅ Account created successfully! Redirecting to login...';
                successMsg.classList.add('show');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                
                let errorText = 'Registration failed. Please try again.';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorText = 'This email is already registered. Please login instead.';
                } else if (error.code === 'auth/invalid-email') {
                    errorText = 'Invalid email address.';
                } else if (error.code === 'auth/weak-password') {
                    errorText = 'Password is too weak. Use at least 6 characters.';
                } else if (error.message.includes('code')) {
                    errorText = error.message;
                }

                errorMsg.textContent = errorText;
                errorMsg.classList.add('show');

                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
