<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Student Login - JAYSTARBLISS STUDIOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --snow: #FFFAFA;
            --madder: #A91B0D;
            --golden: #FFD700;
            --dark: #1a1a1a;
            --gray: #4a5568;
            --light-gray: #f7fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--madder), #8B1507);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }


                body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: repeating-linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.03) 0px,
                rgba(255, 255, 255, 0.03) 10px,
                transparent 10px,
                transparent 40px
            );
            animation: stripesMove 2s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes stripesMove {
            from { transform: translateX(0); }
            to { transform: translateX(-200px); }
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-family: 'Poppins', sans-serif;
            color: var(--madder);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--madder);
            box-shadow: 0 0 0 4px rgba(169, 27, 13, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--madder), #d62a1a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(169, 27, 13, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(169, 27, 13, 0.4);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .register-link a {
            color: var(--madder);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--madder);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            gap: 0.8rem;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 1.5rem;
            }

            .form-group input,
            .login-btn {
                padding: 0.9rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="login.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Main Login
        </a>

        <div class="logo">
            <h1>🎓 Student Portal</h1>
            <p>Enter your credentials to access your personal resources</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="studentLoginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter your username" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="accessCode">Access Code</label>
                <input type="password" id="accessCode" required placeholder="Enter your access code" autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="student-register.html">Register here</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC0K83bfTV3dI_1URsYe_X1-lW-qzEsYmQ",
            authDomain: "jaystarbliss-studios.firebaseapp.com",
            projectId: "jaystarbliss-studios",
            storageBucket: "jaystarbliss-studios.firebasestorage.app",
            messagingSenderId: "885364100276",
            appId: "1:885364100276:web:081a2963cce28a0d0e1be1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('studentLoginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const accessCode = document.getElementById('accessCode').value.trim();

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                // Query for student with matching username and access code
                const studentsRef = collection(db, 'individualStudents');
                const q = query(studentsRef, where('username', '==', username), where('accessCode', '==', accessCode));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    showError('Invalid username or access code');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                    return;
                }

                // Get student data
                const studentDoc = querySnapshot.docs[0];
                const studentData = studentDoc.data();

                // Store student info in session
                sessionStorage.setItem('userRole', 'individualStudent');
                sessionStorage.setItem('studentId', studentDoc.id);
                sessionStorage.setItem('studentUsername', studentData.username);
                sessionStorage.setItem('studentName', studentData.fullName || studentData.username);

                console.log('✅ Student logged in:', studentData.username);

                // Redirect to personal portal
                window.location.href = '../dashboard/student-personal-portal.html';

            } catch (error) {
                console.error('Login error:', error);
                showError('Login failed. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
