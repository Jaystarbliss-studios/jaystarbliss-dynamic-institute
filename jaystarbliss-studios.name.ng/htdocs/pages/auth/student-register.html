<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - JAYSTARBLISS STUDIOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --snow: #FFFAFA;
            --madder: #A91B0D;
            --golden: #FFD700;
            --dark: #1a1a1a;
            --gray: #4a5568;
            --light-gray: #f7fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--madder), #8B1507);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-family: 'Poppins', sans-serif;
            color: var(--madder);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--madder);
            box-shadow: 0 0 0 4px rgba(169, 27, 13, 0.1);
        }

        .register-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--madder), #d62a1a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(169, 27, 13, 0.3);
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(169, 27, 13, 0.4);
        }

        .register-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .login-link a {
            color: var(--madder);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        .error-message {
            background: #fee;
            color: #c00;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
        }

        .message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--madder);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            gap: 0.8rem;
        }

        .info-box {
            background: #fff9e6;
            border-left: 4px solid var(--golden);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .info-box strong {
            color: var(--madder);
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 1.5rem;
            }

            .form-group input,
            .register-btn {
                padding: 0.9rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <a href="student-login.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Login
        </a>

        <div class="logo">
            <h1>📝 Register</h1>
            <p>Create your student account</p>
        </div>

        <div class="info-box">
            <strong>📌 Note:</strong> Your access code will be provided by your instructor. Contact them if you don't have one.
        </div>

        <div class="error-message message" id="errorMessage"></div>
        <div class="success-message message" id="successMessage"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required placeholder="Enter your full name" autocomplete="name">
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Choose a username" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email">Email (Optional)</label>
                <input type="email" id="email" placeholder="your.email@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="accessCode">Access Code</label>
                <input type="password" id="accessCode" required placeholder="Enter the access code from your instructor" autocomplete="new-password">
            </div>

            <button type="submit" class="register-btn" id="registerBtn">Register</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="student-login.html">Login here</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC0K83bfTV3dI_1URsYe_X1-lW-qzEsYmQ",
            authDomain: "jaystarbliss-studios.firebaseapp.com",
            projectId: "jaystarbliss-studios",
            storageBucket: "jaystarbliss-studios.firebasestorage.app",
            messagingSenderId: "885364100276",
            appId: "1:885364100276:web:081a2963cce28a0d0e1be1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const registerBtn = document.getElementById('registerBtn');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const accessCode = document.getElementById('accessCode').value.trim();

            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';

            try {
                // Check if username already exists
                const usernameQuery = query(collection(db, 'individualStudents'), where('username', '==', username));
                const usernameSnapshot = await getDocs(usernameQuery);

                if (!usernameSnapshot.empty) {
                    showError('Username already taken. Please choose another one.');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Register';
                    return;
                }

                // Create student account
                await addDoc(collection(db, 'individualStudents'), {
                    fullName: fullName,
                    username: username,
                    email: email || '',
                    accessCode: accessCode,
                    registeredAt: serverTimestamp()
                });

                console.log('✅ Student registered:', username);
                showSuccess('Registration successful! Redirecting to login...');
                
                form.reset();
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'student-login.html';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                showError('Registration failed. Please try again.');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
