<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Exams - JAYSTARBLISS STUDIOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --snow: #FFFAFA;
            --madder: #A91B0D;
            --golden: #FFD700;
            --dark: #1a1a1a;
            --gray: #4a5568;
            --light-gray: #f7fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light-gray);
            color: var(--dark);
        }

        .header {
            background: linear-gradient(135deg, var(--madder), #8B1507);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
        }

        .school-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .logout-btn {
            padding: 0.6rem 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-left: 1rem;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .welcome-banner {
            background: linear-gradient(135deg, var(--madder), #8B1507);
            color: white;
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 30px rgba(169, 27, 13, 0.3);
        }

        .welcome-banner h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .exams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .exam-card {
            background: white;
            border-radius: 16px;
            padding: 1.8rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .exam-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--madder), var(--golden));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .exam-card:hover::before {
            transform: scaleX(1);
        }

        .exam-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(169, 27, 13, 0.15);
        }

        .exam-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(169, 27, 13, 0.1), rgba(255, 215, 0, 0.1));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            font-size: 2rem;
        }

        .exam-card h3 {
            color: var(--madder);
            margin-bottom: 0.8rem;
            font-size: 1.3rem;
            font-family: 'Poppins', sans-serif;
        }

        .exam-card p {
            color: var(--gray);
            margin-bottom: 1.2rem;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .exam-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 1rem;
        }

        .open-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--madder), #d62a1a);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .open-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(169, 27, 13, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray);
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .exams-grid {
                grid-template-columns: 1fr;
            }

            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1 id="schoolTitle">🏫 School Exam Portal</h1>
            <div>
                <span class="school-badge" id="schoolBadge">Loading...</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
 
    <div class="content">
        <div class="welcome-banner">
            <h2>📝 Examination Questions</h2>
            <p>Access your school's exam questions and assessments</p>
        </div>

        <div class="exams-grid" id="examsGrid">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <p>Loading exam questions...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC0K83bfTV3dI_1URsYe_X1-lW-qzEsYmQ",
            authDomain: "jaystarbliss-studios.firebaseapp.com",
            projectId: "jaystarbliss-studios",
            storageBucket: "jaystarbliss-studios.firebasestorage.app",
            messagingSenderId: "885364100276",
            appId: "1:885364100276:web:081a2963cce28a0d0e1be1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get school from session
        const schoolId = sessionStorage.getItem('schoolId');
        const schoolName = sessionStorage.getItem('schoolName');

        console.log('School ID:', schoolId);
        console.log('School Name:', schoolName);

        // Check if logged in
        if (!schoolId || !schoolName) {
            window.location.href = '../features/school-selector.html';
        }

        // Update UI
        document.getElementById('schoolTitle').textContent = `${schoolName}`;
        document.getElementById('schoolBadge').textContent = schoolName;

        window.logout = function() {
            sessionStorage.removeItem('schoolId');
            sessionStorage.removeItem('schoolName');
            window.location.href = '../features/school-selector.html';
        };

        // Load school-specific exams
        async function loadExams() {
            const grid = document.getElementById('examsGrid');
            grid.innerHTML = '';

            console.log('📚 Loading exams for school:', schoolId);

            try {
                // Get all school exams
                const querySnapshot = await getDocs(collection(db, 'schoolExams'));

                console.log('📦 Total school exams in database:', querySnapshot.size);

                const schoolExams = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    console.log(`📝 Exam: "${data.title}" | School: "${data.schoolId}"`);
                    
                    // Filter for this specific school
                    if (data.schoolId === schoolId) {
                        schoolExams.push({ id: doc.id, data: data });
                    }
                });

                console.log('✅ Exams for this school:', schoolExams.length);

                if (schoolExams.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            <p>No exam questions available yet for ${schoolName}</p>
                            <p style="font-size: 0.85rem; margin-top: 0.5rem;">Your teacher will upload exams soon!</p>
                        </div>
                    `;
                    return;
                }

                // Sort by timestamp
                schoolExams.sort((a, b) => {
                    const timeA = a.data.timestamp?.toDate() || new Date(0);
                    const timeB = b.data.timestamp?.toDate() || new Date(0);
                    return timeB - timeA;
                });

                // Display exams
                schoolExams.forEach((item) => {
                    const card = createExamCard(item.data);
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('❌ Error loading exams:', error);
                grid.innerHTML = `<div class="empty-state"><p>Error loading exams: ${error.message}</p></div>`;
            }
        }

        function createExamCard(data) {
            const card = document.createElement('div');
            card.className = 'exam-card';

            card.innerHTML = `
                <div class="exam-icon">📝</div>
                <h3>${data.title}</h3>
                <div class="exam-meta">
                    <span>📅 ${new Date(data.timestamp?.toDate()).toLocaleDateString()}</span>
                </div>
                <p>${data.description}</p>
                <button class="open-btn" onclick="window.open('${data.url}', '_blank')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    Open Exam
                </button>
            `;

            return card;
        }

        // Load exams
        loadExams();
    </script>
</body>
</html>
