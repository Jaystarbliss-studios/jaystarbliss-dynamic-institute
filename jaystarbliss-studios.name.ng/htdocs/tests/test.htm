<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Magical Gesture Particle System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }
        
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        .animate-bounce { animation: bounce 2s ease-in-out infinite; }
        
        .bg-particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            animation: pulse 3s ease-in-out infinite;
        }
        
        .glow {
            box-shadow: 0 0 30px currentColor;
        }
        
        #threeContainer canvas {
            display: block;
        }

        #videoElement {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            height: 240px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            transform: scaleX(-1);
            z-index: 100;
        }

        #canvasElement {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            height: 240px;
            border: 3px solid rgba(0, 255, 255, 0.5);
            border-radius: 12px;
            z-index: 101;
        }
    </style>
</head>
<body>
    <!-- Intro Screen -->
    <div id="introScreen" class="fixed inset-0 bg-gradient-to-br from-purple-900 via-blue-900 to-indigo-900 flex items-center justify-center z-50">
        <!-- Background particles -->
        <div id="bgParticles" class="absolute inset-0 overflow-hidden"></div>
        
        <!-- Main content -->
        <div class="relative z-10 text-center px-4">
            <!-- Title -->
            <div id="titleSection" class="opacity-0 -translate-y-10 transition-all duration-1000">
                <div class="flex items-center justify-center gap-3 mb-4">
                    <svg class="w-12 h-12 text-yellow-300 animate-spin-slow" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2l2.4 7.4h7.6l-6 4.6 2.3 7-6.3-4.6-6.3 4.6 2.3-7-6-4.6h7.6z"/>
                    </svg>
                    <h1 class="text-6xl md:text-8xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-pink-300 to-purple-300 animate-pulse">
                        ✨ MAGIC ✨
                    </h1>
                    <svg class="w-12 h-12 text-yellow-300 animate-spin-slow" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2l2.4 7.4h7.6l-6 4.6 2.3 7-6.3-4.6-6.3 4.6 2.3-7-6-4.6h7.6z"/>
                    </svg>
                </div>
                
                <h2 class="text-3xl md:text-5xl font-bold text-white mb-8 animate-bounce">
                    Are You Ready for Some Magic?!
                </h2>
            </div>

            <!-- Buttons -->
            <div id="buttonSection" class="opacity-0 translate-y-10 transition-all duration-1000">
                <div class="flex flex-col md:flex-row items-center justify-center gap-6 mt-12">
                    <!-- Yes Button -->
                    <button id="yesBtn" class="relative px-16 py-6 bg-gradient-to-r from-green-400 to-emerald-500 rounded-2xl text-white text-3xl font-bold shadow-2xl transform transition-all hover:scale-110 active:scale-95 glow" style="color: #10b981;">
                        <span class="relative z-10">YES! 🎉</span>
                    </button>

                    <!-- No Button -->
                    <button id="noBtn" class="relative px-16 py-6 bg-gradient-to-r from-red-400 to-pink-500 rounded-2xl text-white text-3xl font-bold shadow-2xl transform transition-all hover:scale-105 active:scale-95 glow" style="color: #f87171;">
                        <span class="relative z-10">No... 😢</span>
                    </button>
                </div>

                <!-- Funny Message -->
                <div id="funnyMessage" class="mt-8 hidden">
                    <div class="inline-block bg-white/90 backdrop-blur-sm px-8 py-4 rounded-2xl shadow-2xl border-4 border-yellow-400 animate-bounce">
                        <p id="messageText" class="text-2xl md:text-3xl font-bold text-gray-800"></p>
                    </div>
                </div>
            </div>

            <!-- Subtitle -->
            <div id="subtitleSection" class="mt-12 opacity-0 transition-all duration-1000">
                <p class="text-xl md:text-2xl text-white/80 font-medium">
                    Control 3D particles with your hand gestures! 👋✨
                </p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div id="threeContainer" class="w-full h-screen bg-black"></div>
        <video id="videoElement" class="hidden" autoplay playsinline></video>
        <canvas id="canvasElement" class="hidden"></canvas>
        
        <!-- Control Panel -->
        <div id="controlPanel" class="absolute top-6 left-6 bg-black/70 backdrop-blur-md rounded-xl p-6 border border-white/10 max-w-sm z-50">
            <h2 class="text-white text-xl font-semibold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"/>
                </svg>
                Gesture Particle System
            </h2>
            
            <!-- Pattern Selection -->
            <div class="mb-6">
                <label class="text-white/80 text-sm mb-2 block">Pattern</label>
                <div id="patternGrid" class="grid grid-cols-3 gap-2"></div>
            </div>
            
            <!-- Color Picker -->
            <div class="mb-6">
                <label class="text-white/80 text-sm mb-2 block flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
                    </svg>
                    Color
                </label>
                <input type="color" id="colorPicker" value="#00ffff" class="w-full h-12 rounded-lg cursor-pointer bg-transparent">
            </div>
            
            <!-- Camera Control -->
            <button id="cameraBtn" class="w-full py-3 px-4 rounded-lg font-medium transition-all flex items-center justify-center gap-2 bg-cyan-500 hover:bg-cyan-600 text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <span id="cameraBtnText">Start Camera</span>
            </button>
            
            <!-- Status Indicators -->
            <div id="statusIndicators" class="mt-4 space-y-2 hidden">
                <div class="flex items-center justify-between text-sm">
                    <span class="text-white/70">Hand Detected:</span>
                    <span id="handStatus" class="font-medium text-red-400">✗ No</span>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <span class="text-white/70">Hand Openness:</span>
                    <span id="gestureValue" class="text-cyan-400 font-medium">0%</span>
                </div>
                <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden">
                    <div id="gestureBar" class="h-full bg-gradient-to-r from-cyan-400 to-blue-500 transition-all duration-100" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <!-- Fullscreen Button -->
        <button id="fullscreenBtn" class="absolute top-6 right-6 bg-black/70 backdrop-blur-md p-4 rounded-xl border border-white/10 hover:bg-black/80 transition-all z-50" title="Toggle Fullscreen">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
            </svg>
        </button>
        
        <!-- Instructions -->
        <div id="instructions" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-black/70 backdrop-blur-md rounded-xl px-6 py-3 border border-white/10 z-50">
            <p class="text-white/80 text-sm text-center">
                🎨 Select a pattern and color, then activate camera for gesture control
            </p>
        </div>
    </div>

    <script>
        // Intro Screen Logic
        const funnyMessages = [
            "Just click Yes for God's sake! 😂",
            "Gosh you must like stress! 😅",
            "The No button is getting shy! 🙈",
            "Why are you doing this to yourself? 🤔",
            "I'm shrinking... help! 😱",
            "Okay, you're stubborn! 😤",
            "The Yes button is feeling lonely 💔",
            "This is getting ridiculous! 🤪",
            "Are you SURE about this? 🧐",
            "Fine, keep clicking... 🙄"
        ];

        let noClickCount = 0;
        let noButtonSize = 1;
        let messageTimeout;

        // Create background particles
        const bgParticles = document.getElementById('bgParticles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'bg-particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 3 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            bgParticles.appendChild(particle);
        }

        // Animate intro sections
        setTimeout(() => {
            document.getElementById('titleSection').classList.remove('opacity-0', '-translate-y-10');
        }, 500);
        setTimeout(() => {
            document.getElementById('buttonSection').classList.remove('opacity-0', 'translate-y-10');
        }, 1500);
        setTimeout(() => {
            document.getElementById('subtitleSection').classList.remove('opacity-0');
        }, 2500);

        // Yes button click
        document.getElementById('yesBtn').addEventListener('click', () => {
            document.getElementById('introScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            initParticleSystem();
        });

        // No button click
        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('click', () => {
            noClickCount++;
            noButtonSize = Math.max(0.2, 1 - noClickCount * 0.15);
            noBtn.style.transform = `scale(${noButtonSize})`;
            noBtn.style.opacity = Math.max(0.3, noButtonSize);

            if (noClickCount % 2 === 0 && noClickCount <= funnyMessages.length * 2) {
                const messageDiv = document.getElementById('funnyMessage');
                const messageText = document.getElementById('messageText');
                messageText.textContent = funnyMessages[Math.floor(noClickCount / 2 - 1) % funnyMessages.length];
                messageDiv.classList.remove('hidden');
                
                clearTimeout(messageTimeout);
                messageTimeout = setTimeout(() => {
                    messageDiv.classList.add('hidden');
                }, 3000);
            }
        });

        // Main App Logic
        const patterns = [
            { id: 'sphere', name: 'Sphere', icon: '⚫' },
            { id: 'cube', name: 'Cube', icon: '⬛' },
            { id: 'torus', name: 'Torus', icon: '⭕' },
            { id: 'helix', name: 'Helix', icon: '🌀' },
            { id: 'wave', name: 'Wave', icon: '〰️' },
            { id: 'galaxy', name: 'Galaxy', icon: '🌌' }
        ];

        let selectedPattern = 'sphere';
        let selectedColor = '#00ffff';
        let cameraActive = false;
        let handDetected = false;
        let gestureStrength = 0;
        let smoothedGesture = 0;
        
        let scene, camera, renderer, particles, animationFrame;
        let hands, cameraInstance;

        // Create pattern buttons
        const patternGrid = document.getElementById('patternGrid');
        patterns.forEach(pattern => {
            const btn = document.createElement('button');
            btn.className = 'p-3 rounded-lg transition-all bg-white/5 border-2 border-white/10 hover:bg-white/10';
            btn.innerHTML = `
                <div class="text-2xl mb-1">${pattern.icon}</div>
                <div class="text-white/90 text-xs">${pattern.name}</div>
            `;
            btn.addEventListener('click', () => {
                selectedPattern = pattern.id;
                updatePatternButtons();
                createParticles(selectedPattern, selectedColor);
            });
            patternGrid.appendChild(btn);
        });

        function updatePatternButtons() {
            const buttons = patternGrid.children;
            for (let i = 0; i < buttons.length; i++) {
                if (patterns[i].id === selectedPattern) {
                    buttons[i].className = 'p-3 rounded-lg transition-all bg-cyan-500/30 border-2 border-cyan-400';
                } else {
                    buttons[i].className = 'p-3 rounded-lg transition-all bg-white/5 border-2 border-white/10 hover:bg-white/10';
                }
            }
        }

        // Color picker
        document.getElementById('colorPicker').addEventListener('input', (e) => {
            selectedColor = e.target.value;
            if (particles) {
                particles.material.color.set(selectedColor);
            }
        });

        // MediaPipe Hands Setup
        function setupMediaPipe() {
            const videoElement = document.getElementById('videoElement');
            const canvasElement = document.getElementById('canvasElement');
            const canvasCtx = canvasElement.getContext('2d');

            hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults(onResults);

            function onResults(results) {
                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    handDetected = true;
                    const landmarks = results.multiHandLandmarks[0];
                    
                    // Draw hand landmarks
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 3});
                    
                    // Calculate hand openness (distance between thumb tip and pinky tip)
                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];
                    const middleTip = landmarks[12];
                    const ringTip = landmarks[16];
                    const pinkyTip = landmarks[20];
                    const wrist = landmarks[0];
                    
                    // Calculate average distance from wrist to fingertips
                    const distances = [indexTip, middleTip, ringTip, pinkyTip].map(tip => {
                        const dx = tip.x - wrist.x;
                        const dy = tip.y - wrist.y;
                        return Math.sqrt(dx * dx + dy * dy);
                    });
                    
                    const avgDistance = distances.reduce((a, b) => a + b, 0) / distances.length;
                    
                    // Normalize to 0-1 range (adjust these values based on testing)
                    const minDist = 0.15;
                    const maxDist = 0.35;
                    const rawGesture = Math.max(0, Math.min(1, (avgDistance - minDist) / (maxDist - minDist)));
                    
                    // Smooth the gesture value
                    gestureStrength = rawGesture;
                    smoothedGesture += (gestureStrength - smoothedGesture) * 0.15;
                    
                } else {
                    handDetected = false;
                    gestureStrength = 0;
                    smoothedGesture += (0 - smoothedGesture) * 0.1;
                }

                canvasCtx.restore();

                // Update UI
                document.getElementById('handStatus').textContent = handDetected ? '✓ Yes' : '✗ No';
                document.getElementById('handStatus').className = handDetected ? 'font-medium text-green-400' : 'font-medium text-red-400';
                document.getElementById('gestureValue').textContent = (smoothedGesture * 100).toFixed(0) + '%';
                document.getElementById('gestureBar').style.width = (smoothedGesture * 100) + '%';
            }
        }

        // Camera button
        const cameraBtn = document.getElementById('cameraBtn');
        const cameraBtnText = document.getElementById('cameraBtnText');
        const statusIndicators = document.getElementById('statusIndicators');
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('canvasElement');

        cameraBtn.addEventListener('click', async () => {
            if (!cameraActive) {
                try {
                    setupMediaPipe();
                    
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: 1280, 
                            height: 720,
                            facingMode: 'user'
                        } 
                    });
                    
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    
                    // Set canvas dimensions
                    canvasElement.width = 320;
                    canvasElement.height = 240;
                    
                    // Start MediaPipe camera
                    cameraInstance = new Camera(videoElement, {
                        onFrame: async () => {
                            await hands.send({image: videoElement});
                        },
                        width: 1280,
                        height: 720
                    });
                    cameraInstance.start();
                    
                    cameraActive = true;
                    videoElement.classList.remove('hidden');
                    canvasElement.classList.remove('hidden');
                    cameraBtn.className = 'w-full py-3 px-4 rounded-lg font-medium transition-all flex items-center justify-center gap-2 bg-red-500 hover:bg-red-600 text-white';
                    cameraBtnText.textContent = 'Stop Camera';
                    statusIndicators.classList.remove('hidden');
                    updateInstructions();
                } catch (err) {
                    console.error('Camera access denied:', err);
                    alert('Camera access denied. Please allow camera access to use gesture control.');
                }
            } else {
                if (cameraInstance) {
                    cameraInstance.stop();
                    cameraInstance = null;
                }
                if (videoElement.srcObject) {
                    videoElement.srcObject.getTracks().forEach(track => track.stop());
                    videoElement.srcObject = null;
                }
                cameraActive = false;
                videoElement.classList.add('hidden');
                canvasElement.classList.add('hidden');
                cameraBtn.className = 'w-full py-3 px-4 rounded-lg font-medium transition-all flex items-center justify-center gap-2 bg-cyan-500 hover:bg-cyan-600 text-white';
                cameraBtnText.textContent = 'Start Camera';
                statusIndicators.classList.add('hidden');
                handDetected = false;
                gestureStrength = 0;
                smoothedGesture = 0;
                updateInstructions();
            }
        });

        function updateInstructions() {
            const instructions = document.getElementById('instructions').querySelector('p');
            if (cameraActive) {
                instructions.textContent = '👋 Open and close your hand to control particles • Particles form when hand is detected';
            } else {
                instructions.textContent = '🎨 Select a pattern and color, then activate camera for gesture control';
            }
        }

        // Fullscreen
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Three.js initialization
        function initParticleSystem() {
            const container = document.getElementById('threeContainer');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(50, 50, 50);
            scene.add(pointLight);

            createParticles(selectedPattern, selectedColor);
            updatePatternButtons();
            animate();

            window.addEventListener('resize', handleResize);
        }

        function createParticles(pattern, color) {
            if (particles) {
                scene.remove(particles);
                particles.geometry.dispose();
                particles.material.dispose();
            }

            const particleCount = 5000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const originalPositions = [];

            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                
                switch (pattern) {
                    case 'sphere':
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        const r = 15 + Math.random() * 5;
                        x = r * Math.sin(phi) * Math.cos(theta);
                        y = r * Math.sin(phi) * Math.sin(theta);
                        z = r * Math.cos(phi);
                        break;
                        
                    case 'cube':
                        x = (Math.random() - 0.5) * 30;
                        y = (Math.random() - 0.5) * 30;
                        z = (Math.random() - 0.5) * 30;
                        break;
                        
                    case 'torus':
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 15 + Math.random() * 5;
                        const tubeRadius = 5 + Math.random() * 3;
                        x = (radius + tubeRadius * Math.cos(angle)) * Math.cos(angle * 3);
                        y = (radius + tubeRadius * Math.cos(angle)) * Math.sin(angle * 3);
                        z = tubeRadius * Math.sin(angle);
                        break;
                        
                    case 'helix':
                        const t = i / particleCount * Math.PI * 10;
                        const helixRadius = 10;
                        x = helixRadius * Math.cos(t);
                        y = (i / particleCount - 0.5) * 50;
                        z = helixRadius * Math.sin(t);
                        break;
                        
                    case 'wave':
                        x = (i / particleCount - 0.5) * 50;
                        y = Math.sin(x * 0.5) * 10;
                        z = Math.cos(x * 0.3) * 5;
                        break;
                        
                    case 'galaxy':
                        const spiralAngle = Math.random() * Math.PI * 2;
                        const spiralRadius = Math.random() * 20;
                        const armOffset = Math.floor(Math.random() * 3) * (Math.PI * 2 / 3);
                        x = spiralRadius * Math.cos(spiralAngle + spiralRadius * 0.3 + armOffset);
                        y = (Math.random() - 0.5) * 5;
                        z = spiralRadius * Math.sin(spiralAngle + spiralRadius * 0.3 + armOffset);
                        break;
                        
                    default:
                        x = (Math.random() - 0.5) * 30;
                        y = (Math.random() - 0.5) * 30;
                        z = (Math.random() - 0.5) * 30;
                }
                
                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;
                originalPositions.push({ x, y, z });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: new THREE.Color(color),
                size: 0.5,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            particles.userData = { originalPositions };
            scene.add(particles);
        }

        function animate() {
            animationFrame = requestAnimationFrame(animate);
            
            if (particles) {
                const positions = particles.geometry.attributes.position.array;
                const time = Date.now() * 0.001;
                
                // If no hand is detected, keep particles dispersed
                const assemblyFactor = handDetected ? smoothedGesture : 0;
                const scale = 0.1 + assemblyFactor * 1.2;
                const dispersion = (1 - assemblyFactor) * 50;
                
                for (let i = 0; i < positions.length; i += 3) {
                    const idx = i / 3;
                    const originalPos = particles.userData.originalPositions[idx];
                    
                    // Random dispersion when no hand
                    const randomX = Math.sin(time * 0.5 + idx * 0.01) * dispersion;
                    const randomY = Math.cos(time * 0.3 + idx * 0.02) * dispersion;
                    const randomZ = Math.sin(time * 0.4 + idx * 0.015) * dispersion;
                    
                    // Smoothly transition between dispersed and assembled states
                    positions[i] = originalPos.x * scale + randomX;
                    positions[i + 1] = originalPos.y * scale + randomY;
                    positions[i + 2] = originalPos.z * scale + randomZ;
                }
                
                particles.geometry.attributes.position.needsUpdate = true;
                particles.rotation.y += 0.002 * (1 - assemblyFactor * 0.5);
                particles.rotation.x += 0.001 * (1 - assemblyFactor * 0.5);
            }
            
            renderer.render(scene, camera);
        }

        function handleResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
